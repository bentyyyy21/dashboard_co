<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TCL 光伏科技 | 各省边界数据看板</title>
    <link rel="icon" type="image/png" href="assets/tcl_logo.png" />
    <link rel="apple-touch-icon" href="assets/tcl_logo.png" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="assets/echarts.min.js"></script>
    <script defer src="data/dashboard-data.js"></script>
    <script defer src="data/energy-mix-data.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="brand-nav" aria-label="TCL 光伏科技品牌导航">
        <div class="brand-block">
          <img class="brand-logo" src="assets/tcl_logo.png" alt="TCL" />
          <div class="brand-copy">
            <h1><span class="title-brand">TCL 光伏科技</span><span class="page-title">各省边界数据看板</span></h1>
            <p>能源运营中心·电碳业务部 | 政策分析组</p>
            <p id="dataStamp" hidden></p>
          </div>
        </div>
        <nav class="module-nav" aria-label="模块导航">
          <a class="active" href="#energyMixSection" data-section="energyMixSection">装机电量</a>
          <a href="#boundaryFilterSection" data-section="boundaryFilterSection">边界数据</a>
          <a href="#fieldsSection" data-section="fieldsSection">边界条件</a>
          <a href="#dashboardSection" data-section="dashboardSection">省份看板</a>
        </nav>
      </header>

      <section class="energy-mix-panel" id="energyMixSection" aria-label="各省装机与发电量结构">
        <div class="section-heading">
          <div>
            <strong>装机结构与发电量构成</strong>
            <span>按省份和年份展示电源装机与年度发电量占比。</span>
          </div>
          <div class="mix-meta" id="energyMixMeta"></div>
        </div>
        <div class="module-filters energy-filters">
          <label>
            省份
            <select id="energyProvinceSelect"></select>
          </label>
          <label>
            年份
            <select id="energyYearSelect"></select>
          </label>
        </div>
        <div class="mix-grid" id="energyMixGrid"></div>
      </section>

      <section class="control-panel" id="boundaryFilterSection" aria-label="边界数据筛选条件">
        <div class="section-heading compact-heading">
          <div>
            <strong>边界数据</strong>
            <span>按省份与日期筛选日前、实时边界数据。</span>
          </div>
        </div>
        <div class="filters">
          <label>
            省份
            <select id="provinceSelect"></select>
          </label>
          <label>
            开始日期
            <input id="startDate" type="date" />
          </label>
          <label>
            结束日期
            <input id="endDate" type="date" />
          </label>
          <div class="actions">
            <button id="todayButton" type="button">单日</button>
            <button id="resetButton" type="button">全量</button>
          </div>
        </div>
      </section>

      <section class="metrics" id="metricsSection"></section>

      <section class="field-panel" id="fieldsSection" aria-label="边界条件选择">
        <div class="field-heading">
          <strong>边界条件</strong>
          <span>勾选字段后，日前与实时图按分时序列对比展示。</span>
        </div>
        <div class="field-grid" id="fieldGrid"></div>
      </section>

      <section id="dashboardSection" class="dashboard"></section>
      <section id="emptyState" class="empty-state" hidden>没有匹配当前筛选条件的数据。</section>
    </main>
    <aside class="brand-watermark" aria-label="TCL 光伏科技品牌价值">
      <img class="watermark-logo" src="assets/tcl_logo.png" alt="TCL" />
      <div class="watermark-copy">
        <div class="watermark-head">
          <span class="watermark-divider"></span>
          <strong>TCL 光伏科技</strong>
        </div>
        <div class="watermark-values">
          <span>变革</span>
          <span>创新</span>
          <span>当责</span>
          <span>卓越</span>
        </div>
        <p>如有问题咨询政策组林键彬</p>
      </div>
    </aside>
  </body>
</html>
